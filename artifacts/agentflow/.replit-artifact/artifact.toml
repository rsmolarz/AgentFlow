kind = "web"
previewPath = "/"
title = "AgentFlow - AI Agent Management Platform"
version = "1.0.0"
id = "artifacts/agentflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24547
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/agentflow run dev"

[services.env]
PORT = "24547"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/agentflow", "run", "build"]
publicDir = "artifacts/agentflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
